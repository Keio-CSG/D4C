a_qconfig:
    quantizer: LSQFakeQuantize
    observer: MSEObserver
    bit: 8
    symmetric: False
    ch_axis: -1
w_qconfig:
    quantizer: AdaRoundFakeQuantize
    observer: MSEObserver
    bit: 4
    symmetric: False
    ch_axis: 0
calibrate:
    visual: 128
    text: 512
recon:
    visual_batch_size: 32
    text_batch_size: 32
    visual_scale_lr: 4.0e-5
    text_scale_lr: 4.0e-6
    warm_up: 0.2
    weight: 0.01
    iters: 20000
    b_range: [20, 2]
    keep_gpu: True
    round_mode: learned_hard_sigmoid
    drop_prob: 1.0